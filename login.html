<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AMD Marketplace</title>

<link rel="icon" type="image/png" href="images/dj.png">
<link rel="stylesheet" href="login.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg-blur blur-1"></div>
<div class="bg-blur blur-2"></div>
<div class="bg-blur blur-3"></div>

<header>
<nav class="navbar">

<div class="logo">
<a href="index.html">
<img src="images/dj.png" alt="AMD Marketplace">
</a>
</div>

<div class="nav-right">
<a href="signup.html" class="signup-btn">Create Account</a>
</div>

</nav>
</header>

<section class="login-section">

<div class="login-card">

<div class="login-header">

<span class="badge">🔐 Welcome Back</span>

<h1>Login to AMD Marketplace</h1>

<p>
Sign in to continue as a Client or Freelancer.
</p>

</div>

<form id="loginForm">

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password">
</div>

<div class="login-options">

<label class="remember">
<input type="checkbox">
Remember Me
</label>

<a href="forgot-password.html" class="forgot-link">
Forgot Password?
</a>

</div>

<button type="submit" class="login-btn-main">
Login
</button>

<!-- PART 2 CONTINUES HERE -->
<div class="divider">
<span>OR</span>
</div>

<div class="social-buttons">
<button type="button" class="google-btn">Continue with Google</button>
<button type="button" class="facebook-btn">Continue with Facebook</button>
</div>

<p class="signup-link">
Don't have an account?
<a href="signup.html">Create Account</a>
</p>

</form>

<div class="back-home">
<a href="index.html" class="back-btn">
🏠 Return to Homepage
</a>
</div>

</div>
</section>

<footer class="footer">
<p>© 2026 AMD Marketplace. All Rights Reserved.</p>
</footer>

<script src="login.js"></script>

</body>
</html>
